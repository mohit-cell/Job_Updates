<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="container">
      <div>
        <h1>Application Workspace</h1>
        <nav class="viewTabs" aria-label="Tracker views">
          <button id="jobsTab" class="tabButton active" type="button">Job Tracker</button>
          <button id="postsTab" class="tabButton" type="button">Post Tracker</button>
        </nav>
      </div>
      <div class="meta">
        <span id="summary">—</span>
        <button id="themeToggle" class="secondary">Light Mode</button>
        <button id="exportBtn" class="secondary">Export CSV</button>
      </div>
    </header>

    <main class="container">
      <section id="jobsView" class="trackerView">
        <section class="controls">
          <input id="search" type="search" placeholder="Search company or link..." />
          <select id="orderBy">
            <option value="posted_desc">Posted (newest)</option>
            <option value="posted_asc">Posted (oldest)</option>
            <option value="id_desc">ID (newest)</option>
            <option value="id_asc">ID (oldest)</option>
          </select>
          <select id="jobAppliedState">
            <option value="all">All statuses</option>
            <option value="applied">Applied</option>
            <option value="not_applied">Not Applied</option>
          </select>
          <div class="spacer"></div>
          <span id="selectionCount">0 selected</span>
          <button id="bulkApply" class="primary">Mark Applied</button>
          <button id="bulkUnapply" class="secondary">Mark Unapplied</button>
        </section>

        <div class="tableWrap">
          <table id="jobsTable">
            <thead>
              <tr>
                <th><input id="selectAll" type="checkbox" /></th>
                <th>ID</th>
                <th>Company</th>
                <th>Applied</th>
                <th>Link</th>
                <th>Applied At</th>
                <th>Date Posted</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsBody"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty hidden">No jobs match your filter.</div>
      </section>

      <section id="postsView" class="trackerView hidden">
        <section class="controls">
          <input id="postSearch" type="search" placeholder="Search post ID or link..." />
          <select id="postOrderBy">
            <option value="posted_desc">Posted (newest)</option>
            <option value="posted_asc">Posted (oldest)</option>
            <option value="id_desc">ID (highest)</option>
            <option value="id_asc">ID (lowest)</option>
          </select>
          <select id="postAppliedState">
            <option value="all">All statuses</option>
            <option value="applied">Applied</option>
            <option value="not_applied">Not Applied</option>
          </select>
          <label class="fieldGroup">
            <span>Posted from</span>
            <input id="postDateFrom" type="date" />
          </label>
          <label class="fieldGroup">
            <span>Posted to</span>
            <input id="postDateTo" type="date" />
          </label>
          <label class="checkbox">
            <input id="onlyWithLink" type="checkbox" checked /> Only rows with links
          </label>
        </section>

        <div class="tableWrap">
          <table id="postsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Post Link</th>
                <th>Posted Date</th>
                <th>Applied</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="postsBody"></tbody>
          </table>
        </div>
        <div id="postsEmptyState" class="empty hidden">No posts match your filter.</div>
      </section>
    </main>

    <footer class="container small">
      Built for your Jobs_List and Posts tables. Job changes save instantly.
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
